<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshall Defense Database</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #080E14;
            color: #EBE8E2;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.6;
        }

        /* ── NAV ── */
        nav {
            background: rgba(8,14,20,0.96);
            border-bottom: 1px solid #1E2530;
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }

        .logomark {
            width: 30px;
            height: 30px;
            background: #C8973E;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #080E14;
            flex-shrink: 0;
        }

        .wordmark {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .nav-stats {
            display: flex;
            gap: 30px;
            font-size: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: #C8973E;
            font-size: 14px;
        }

        /* ── MAIN CONTAINER ── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        /* ── HERO ── */
        .hero {
            margin-bottom: 60px;
        }

        .hero-title {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 48px;
            font-weight: 400;
            line-height: 1.08;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #7A8394;
            margin-bottom: 30px;
            max-width: 600px;
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            background: #111418;
            border: 1px solid #1E2530;
            border-radius: 8px;
            padding: 12px 16px;
            color: #EBE8E2;
            font-size: 14px;
        }

        .search-box:focus {
            outline: none;
            border-color: #C8973E;
        }

        select, input[type="checkbox"] {
            background: #111418;
            border: 1px solid #1E2530;
            border-radius: 6px;
            padding: 10px 12px;
            color: #EBE8E2;
            font-size: 14px;
            font-family: 'DM Sans', system-ui, sans-serif;
            cursor: pointer;
        }

        select:focus, input[type="checkbox"]:focus {
            outline: none;
            border-color: #C8973E;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: #C8973E;
            color: #080E14;
            border: none;
            border-radius: 8px;
            padding: 11px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', system-ui, sans-serif;
            letter-spacing: 0.02em;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #E0A855;
        }

        .btn-secondary {
            background: transparent;
            color: #EBE8E2;
            border: 1px solid #1E2530;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', system-ui, sans-serif;
            transition: border-color 0.2s;
        }

        .btn-secondary:hover {
            border-color: #C8973E;
        }

        .btn-small {
            background: #C8973E;
            color: #080E14;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        /* ── COMPANIES TABLE ── */
        .companies-container {
            background: #111418;
            border: 1px solid #1E2530;
            border-radius: 14px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 0.8fr 0.8fr 0.6fr;
            gap: 20px;
            padding: 20px 24px;
            background: #0D1520;
            border-bottom: 1px solid #1E2530;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #4A5260;
        }

        .table-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 0.8fr 0.8fr 0.6fr;
            gap: 20px;
            padding: 20px 24px;
            border-bottom: 1px solid #1E2530;
            align-items: center;
            transition: background 0.2s;
            cursor: pointer;
        }

        .table-row:hover {
            background: #0D1520;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .company-name {
            font-weight: 700;
            color: #EBE8E2;
        }

        .company-location {
            font-size: 13px;
            color: #7A8394;
        }

        .tag {
            display: inline-block;
            background: rgba(200,151,62,0.12);
            border: 1px solid rgba(200,151,62,0.28);
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 700;
            color: #C8973E;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }

        .score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #C8973E;
        }

        .score-null {
            color: #4A5260;
            font-style: italic;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(61,214,140,0.1);
            border: 1px solid rgba(61,214,140,0.25);
            border-radius: 100px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 600;
            color: #3DD68C;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3DD68C;
        }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #111418;
            margin: 50px auto;
            padding: 40px;
            border: 1px solid #1E2530;
            border-radius: 14px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1E2530;
        }

        .modal-title {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
        }

        .close-btn {
            background: none;
            border: none;
            color: #7A8394;
            font-size: 28px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #EBE8E2;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            color: #C8973E;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .form-input, .form-textarea {
            width: 100%;
            background: #0D1520;
            border: 1px solid #1E2530;
            border-radius: 6px;
            padding: 12px 16px;
            color: #EBE8E2;
            font-size: 14px;
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #C8973E;
            background: #141A24;
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            background: #0D1520;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .score-input {
            display: flex;
            flex-direction: column;
        }

        .score-input label {
            font-size: 12px;
            font-weight: 600;
            color: #7A8394;
            margin-bottom: 8px;
        }

        .score-input input {
            background: #111418;
            border: 1px solid #1E2530;
            border-radius: 4px;
            padding: 8px 12px;
            color: #EBE8E2;
            font-size: 13px;
        }

        .score-input input:focus {
            outline: none;
            border-color: #C8973E;
        }

        /* ── PAGINATION ── */
        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 40px;
            align-items: center;
        }

        .pagination button {
            background: #111418;
            border: 1px solid #1E2530;
            color: #EBE8E2;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .pagination button:hover {
            border-color: #C8973E;
        }

        .pagination button.active {
            background: #C8973E;
            color: #080E14;
            border-color: #C8973E;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            padding: 60px 40px;
            text-align: center;
            color: #7A8394;
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #EBE8E2;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1024px) {
            .table-header, .table-row {
                grid-template-columns: 1fr 1fr 0.8fr 0.6fr;
                gap: 12px;
            }

            .nav-stats {
                display: none;
            }
        }

        @media (max-width: 768px) {
            nav, .container {
                padding: 0 20px;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .table-header, .table-row {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .hero-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a class="nav-logo" href="/">
            <div class="logomark">M</div>
            <span class="wordmark">MARSHALL</span>
        </a>
        <div class="nav-stats">
            <div class="stat-item">
                <span class="stat-value" id="nav-total">-</span>
                <span>Companies</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="nav-socal">-</span>
                <span>SoCal</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="nav-avg">-</span>
                <span>Avg Score</span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1 class="hero-title">Defense Manufacturing Database</h1>
            <p class="hero-subtitle">Identify, verify, and engage production-ready defense contractors. Real readiness metrics.</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <input 
                type="text" 
                class="search-box" 
                id="searchInput" 
                placeholder="Search companies by name, location, certifications..."
            >
            <div class="filter-group">
                <select id="stateFilter">
                    <option value="">All States</option>
                    <option value="CA">California</option>
                </select>
            </div>
            <div class="filter-group">
                <input type="checkbox" id="soCalOnly">
                <label for="soCalOnly" style="margin: 0; cursor: pointer;">SoCal Only</label>
            </div>
            <button class="btn-primary" onclick="openAddCompanyModal()">+ Add Company</button>
            <button class="btn-primary" style="background:#1E2530; margin-left:8px;" onclick="adminSignOut()" title="Clear cached admin credentials">Admin sign out</button>
            <button class="btn-secondary" onclick="loadCompanies()">Refresh</button>
        </div>

        <!-- Companies Table -->
        <div class="companies-container">
            <div class="table-header">
                <div>Company Name</div>
                <div>Location</div>
                <div>Certifications</div>
                <div>Stage</div>
                <div>Status</div>
                <div>Score</div>
            </div>
            <div id="companiesTable">
                <div style="padding: 40px; text-align: center; color: #7A8394;">
                    Loading companies...
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Company Details Modal -->
    <div id="companyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="companyModalTitle">Company Details</h2>
                <button class="close-btn" onclick="closeCompanyModal()">&times;</button>
            </div>
            <div id="companyModalBody"></div>
        </div>
    </div>

    <!-- Add Company Modal -->
    <div id="addCompanyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Company</h2>
                <button class="close-btn" onclick="closeAddCompanyModal()">&times;</button>
            </div>
            <form id="addCompanyForm" onsubmit="submitAddCompany(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Company Name *</label>
                        <input type="text" name="company_name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location (City, State) *</label>
                        <input type="text" name="location" class="form-input" placeholder="San Diego, CA" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Website</label>
                        <input type="url" name="website" class="form-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" name="phone" class="form-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Contact Person</label>
                        <input type="text" name="contact_person" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Email</label>
                        <input type="email" name="contact_email" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Industry Focus</label>
                    <input type="text" name="industry_focus" class="form-input" placeholder="Aerospace, Electronics, Composites, etc.">
                </div>

                <div class="form-group">
                    <label class="form-label">Manufacturing Processes</label>
                    <textarea name="manufacturing_processes" class="form-textarea" placeholder="CNC, Machining, Welding, 3D Printing, etc."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Equipment & Capabilities</label>
                    <textarea name="equipment_capabilities" class="form-textarea" placeholder="5-axis CNC, High-speed spindles, Cleanroom, etc."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Materials</label>
                    <input type="text" name="materials" class="form-input" placeholder="Aluminum, Titanium, Composites, etc.">
                </div>

                <div class="form-group">
                    <label class="form-label">Certifications</label>
                    <input type="text" name="certifications" class="form-input" placeholder="AS9100, ISO 9001, ISO 13485, etc.">
                </div>

                <div class="form-group">
                    <label class="form-label">Production Stage</label>
                    <select name="production_stage" class="form-input">
                        <option value="">Select...</option>
                        <option value="R&D">R&D</option>
                        <option value="Prototype">Prototype</option>
                        <option value="Limited Production">Limited Production</option>
                        <option value="Full Production">Full Production</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Defense Relevance</label>
                    <textarea name="defense_relevance" class="form-textarea" placeholder="How this company is relevant to defense..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Relationship Status</label>
                    <select name="relationship_status" class="form-input">
                        <option value="cold">Cold</option>
                        <option value="warm">Warm</option>
                        <option value="engaged">Engaged</option>
                        <option value="partner">Partner</option>
                    </select>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                        <input type="checkbox" name="is_southern_california">
                        <span>Southern California</span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-textarea"></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Add Company</button>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script>
        const API_BASE = '/api';
        let currentPage = 0;
        const pageSize = 50;
        let allCompanies = [];

        // Load companies on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadCompanies();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 0;
                loadCompanies();
            });

            document.getElementById('stateFilter').addEventListener('change', () => {
                currentPage = 0;
                loadCompanies();
            });

            document.getElementById('soCalOnly').addEventListener('change', () => {
                currentPage = 0;
                loadCompanies();
            });

            // Close modal when clicking outside
            window.addEventListener('click', (e) => {
                const companyModal = document.getElementById('companyModal');
                const addModal = document.getElementById('addCompanyModal');
                if (e.target === companyModal) closeCompanyModal();
                if (e.target === addModal) closeAddCompanyModal();
            });
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const stats = await response.json();
                
                document.getElementById('nav-total').textContent = stats.total_companies;
                document.getElementById('nav-socal').textContent = stats.southern_california_count;
                document.getElementById('nav-avg').textContent = stats.average_readiness.toFixed(1);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadCompanies() {
            try {
                const searchTerm = document.getElementById('searchInput').value;
                const soCalOnly = document.getElementById('soCalOnly').checked;
                
                let url = `${API_BASE}/companies?skip=${currentPage * pageSize}&limit=${pageSize}`;
                
                if (soCalOnly) {
                    url += '&southern_california_only=true';
                }

                if (searchTerm) {
                    url = `${API_BASE}/companies/search?q=${encodeURIComponent(searchTerm)}`;
                }

                const response = await fetch(url);
                const companies = await response.json();
                
                displayCompanies(companies);
                updatePagination(companies.length);
            } catch (error) {
                console.error('Error loading companies:', error);
                document.getElementById('companiesTable').innerHTML = 
                    '<div style="padding: 40px; text-align: center; color: #7A8394;">Error loading companies</div>';
            }
        }

        function displayCompanies(companies) {
            const table = document.getElementById('companiesTable');
            
            if (companies.length === 0) {
                table.innerHTML = '<div class="empty-state"><div class="empty-state-title">No companies found</div></div>';
                return;
            }

            table.innerHTML = companies.map(company => `
                <div class="table-row" onclick="openCompanyModal(${company.id})">
                    <div>
                        <div class="company-name">${company.company_name}</div>
                        <div class="company-location">${company.location}</div>
                    </div>
                    <div>${company.location}</div>
                    <div>
                        ${company.certifications ? company.certifications.split(',').slice(0, 2).map(cert => 
                            `<span class="tag">${cert.trim().substring(0, 10)}</span>`
                        ).join('') : '<span style="color: #4A5260;">—</span>'}
                    </div>
                    <div>
                        ${company.production_stage ? `<span style="color: #7A8394; font-size: 13px;">${company.production_stage}</span>` : '—'}
                    </div>
                    <div>
                        <div class="status-badge">
                            <div class="status-dot"></div>
                            ${company.relationship_status}
                        </div>
                    </div>
                    <div>
                        <div class="score">
                            ${(company.readiness_scores && company.readiness_scores.overall_readiness_score != null) ? company.readiness_scores.overall_readiness_score.toFixed(0) : '-'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openCompanyModal(companyId) {
            try {
                const response = await fetch(`${API_BASE}/companies/${companyId}`);
                const company = await response.json();
                
                document.getElementById('companyModalTitle').textContent = company.company_name;
                
                const body = document.getElementById('companyModalBody');
                body.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                        <div>
                            <div style="margin-bottom: 24px;">
                                <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Location</div>
                                <div style="font-size: 16px;">${company.location}</div>
                            </div>

                            <div style="margin-bottom: 24px;">
                                <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Website</div>
                                <div style="font-size: 14px;"><a href="${company.website}" target="_blank" style="color: #C8973E; text-decoration: none;">${company.website || '—'}</a></div>
                            </div>

                            <div style="margin-bottom: 24px;">
                                <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Contact</div>
                                <div style="font-size: 14px; color: #7A8394;">
                                    ${company.contact_person ? company.contact_person + '<br>' : ''}
                                    ${company.contact_email ? `<a href="mailto:${company.contact_email}" style="color: #C8973E; text-decoration: none;">${company.contact_email}</a><br>` : ''}
                                    ${company.phone || ''}
                                </div>
                            </div>

                            <div style="margin-bottom: 24px;">
                                <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Industry Focus</div>
                                <div style="font-size: 14px;">${company.industry_focus || '—'}</div>
                            </div>

                            <div style="margin-bottom: 24px;">
                                <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Certifications</div>
                                <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                    ${company.certifications ? company.certifications.split(',').map(cert => 
                                        `<span class="tag">${cert.trim()}</span>`
                                    ).join('') : '<span style="color: #4A5260;">—</span>'}
                                </div>
                            </div>
                        </div>

                        <div>
                            ${company.readiness_scores ? `
                                <div style="background: #0D1520; border: 1px solid #1E2530; border-radius: 8px; padding: 20px; margin-bottom: 20px;">
                                    <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 16px;">Readiness Scores</div>
                                    <div style="font-size: 32px; font-weight: 700; color: #C8973E; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px;">
                                        ${company.readiness_scores.overall_readiness_score.toFixed(1)}
                                    </div>
                                    <div style="display: grid; gap: 12px; font-size: 12px;">
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: #7A8394;">Manufacturing Maturity</span>
                                            <span style="color: #C8973E; font-weight: 700;">${company.readiness_scores.manufacturing_maturity.toFixed(0)}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: #7A8394;">Quality/Compliance</span>
                                            <span style="color: #C8973E; font-weight: 700;">${company.readiness_scores.quality_compliance_readiness.toFixed(0)}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: #7A8394;">Scalability</span>
                                            <span style="color: #C8973E; font-weight: 700;">${company.readiness_scores.production_scalability.toFixed(0)}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: #7A8394;">Defense Applicability</span>
                                            <span style="color: #C8973E; font-weight: 700;">${company.readiness_scores.defense_applicability.toFixed(0)}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: #7A8394;">Responsiveness</span>
                                            <span style="color: #C8973E; font-weight: 700;">${company.readiness_scores.responsiveness_operational_readiness.toFixed(0)}</span>
                                        </div>
                                    </div>
                                </div>
                            ` : '<div style="color: #7A8394; padding: 20px; text-align: center;">No scores yet</div>'}

                            <button class="btn-primary" onclick="openScoreModal(${company.id})" style="width: 100%; padding: 12px;">
                                ${company.readiness_scores ? 'Update Score' : 'Add Score'}
                            </button>
                        </div>
                    </div>

                    <div style="margin-top: 30px; padding-top: 30px; border-top: 1px solid #1E2530;">
                        <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Manufacturing Processes</div>
                        <div style="font-size: 14px; color: #7A8394; white-space: pre-wrap;">${company.manufacturing_processes || '—'}</div>
                    </div>

                    <div style="margin-top: 20px;">
                        <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Equipment & Capabilities</div>
                        <div style="font-size: 14px; color: #7A8394; white-space: pre-wrap;">${company.equipment_capabilities || '—'}</div>
                    </div>

                    <div style="margin-top: 20px;">
                        <div style="font-size: 11px; color: #C8973E; text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Defense Relevance</div>
                        <div style="font-size: 14px; color: #7A8394; white-space: pre-wrap;">${company.defense_relevance || '—'}</div>
                    </div>

                    <div style="margin-top: 20px;">
                        <button class="btn-secondary" onclick="deleteCompany(${company.id})" style="width: 100%; padding: 12px;">Delete Company</button>
                    </div>
                `;
                
                document.getElementById('companyModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading company:', error);
                alert('Error loading company details');
            }
        }

        function closeCompanyModal() {
            document.getElementById('companyModal').style.display = 'none';
        }

        function openAddCompanyModal() {
            // Gate the modal itself: prompt for admin creds up front.
            // Cached in sessionStorage, so subsequent opens don't re-prompt.
            if (!getAdminAuth()) return;
            document.getElementById('addCompanyModal').style.display = 'block';
        }

        function closeAddCompanyModal() {
            document.getElementById('addCompanyModal').style.display = 'none';
            document.getElementById('addCompanyForm').reset();
        }

        // --- Admin auth (HTTP Basic) for mutating endpoints ---
        function adminSignOut() {
            sessionStorage.removeItem('marshallAdminAuth');
            alert('Admin credentials cleared. You will be prompted again on the next protected action.');
        }

        function getAdminAuth(forcePrompt = false) {
            let token = sessionStorage.getItem('marshallAdminAuth');
            if (!token || forcePrompt) {
                const user = prompt('Admin username:');
                if (user === null) return null;
                const pass = prompt('Admin password:');
                if (pass === null) return null;
                token = 'Basic ' + btoa(user + ':' + pass);
                sessionStorage.setItem('marshallAdminAuth', token);
            }
            return token;
        }

        async function adminFetch(url, options = {}) {
            const auth = getAdminAuth();
            if (!auth) return null;
            options.headers = { ...(options.headers || {}), 'Authorization': auth };
            let resp = await fetch(url, options);
            if (resp.status === 401) {
                sessionStorage.removeItem('marshallAdminAuth');
                const retryAuth = getAdminAuth(true);
                if (!retryAuth) return resp;
                options.headers['Authorization'] = retryAuth;
                resp = await fetch(url, options);
            }
            return resp;
        }

        async function submitAddCompany(e) {
            e.preventDefault();

            const formData = new FormData(document.getElementById('addCompanyForm'));
            const data = Object.fromEntries(formData);

            try {
                const response = await adminFetch(`${API_BASE}/companies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response) return;
                
                if (response.ok) {
                    closeAddCompanyModal();
                    loadStats();
                    loadCompanies();
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.detail);
                }
            } catch (error) {
                console.error('Error adding company:', error);
                alert('Error adding company');
            }
        }

        async function openScoreModal(companyId) {
            // For now, just show an alert
            const scores = prompt('Enter scores (0-100) separated by commas:\nManufacturing Maturity, Quality/Compliance, Scalability, Defense Applicability, Responsiveness');
            
            if (scores) {
                const [m, q, p, d, r] = scores.split(',').map(s => parseFloat(s.trim()));
                
                try {
                    const response = await adminFetch(`${API_BASE}/companies/${companyId}/readiness`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            manufacturing_maturity: m,
                            quality_compliance_readiness: q,
                            production_scalability: p,
                            defense_applicability: d,
                            responsiveness_operational_readiness: r,
                            assessed_by: 'Manual'
                        })
                    });
                    if (!response) return;
                    
                    if (response.ok) {
                        loadStats();
                        closeCompanyModal();
                    }
                } catch (error) {
                    console.error('Error updating score:', error);
                }
            }
        }

        async function deleteCompany(companyId) {
            if (confirm('Are you sure you want to delete this company?')) {
                try {
                    const response = await adminFetch(`${API_BASE}/companies/${companyId}`, {
                        method: 'DELETE'
                    });
                    if (!response) return;
                    
                    if (response.ok) {
                        closeCompanyModal();
                        loadStats();
                        loadCompanies();
                    }
                } catch (error) {
                    console.error('Error deleting company:', error);
                }
            }
        }

        function updatePagination(itemCount) {
            if (itemCount < pageSize) {
                document.getElementById('pagination').innerHTML = '';
            }
        }
    </script>
</body>
</html>
