services:
  - type: web
    name: marshall-app
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false  # set in Render dashboard to your Neon connection string
      - key: ADMIN_USER
        sync: false  # admin username for write endpoints
      - key: ADMIN_PASS
        sync: false  # admin password for write endpoints
